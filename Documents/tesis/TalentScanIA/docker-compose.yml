name: talentscan

services:
  postgres:
    image: postgres:15
    container_name: talentscan_db
    restart: always
    environment:
      POSTGRES_DB: talentscan
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d talentscan"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: talentscan_web
    restart: always
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - media_data:/app/media
    ports:
      - "8090:8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SECRET_KEY: ${SECRET_KEY:-django-insecure-local-dev-key}
      DEBUG: ${DEBUG:-True}
      DB_NAME: ${DB_NAME:-talentscan}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres123}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}

volumes:
  postgres_data:
  media_data:
