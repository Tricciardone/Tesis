<div class="card chart-card">
    <div class="card-body">
        <div class="chart-title">
            <div class="chart-title-icon">
                <i class="fas {{ icon }}"></i>
            </div>
            <h5>{{ title }}</h5>
        </div>

        {% if items %}
            {% for name, count in items %}
            <div class="bar-row">
                <div class="d-flex justify-content-between align-items-center gap-3">
                    <div class="bar-label" title="{{ name }}">{{ name }}</div>
                    <span class="bar-count">{{ count }}</span>
                </div>

                <div class="bar-track">
                    <div class="bar-fill" style="width: {% widthratio count items.0.1 100 %}%"></div>
                </div>
            </div>
            {% endfor %}
        {% else %}
            <div class="empty-box">
                <i class="fas fa-info-circle"></i>
                <span>No hay datos suficientes para esta métrica.</span>
            </div>
        {% endif %}
    </div>
</div>
